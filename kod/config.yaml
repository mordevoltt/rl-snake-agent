# Snake RL Eğitim Hiperparametreleri
# Hocanın istediği merkezi konfigürasyon dosyası

training:
  total_timesteps: 500000
  num_cpu: 8
  learning_rate: 0.0003
  n_steps: 512
  batch_size: 128
  n_epochs: 10
  gamma: 0.99
  gae_lambda: 0.95
  ent_coef: 0.02
  clip_range: 0.2

model:
  lstm_hidden_size: 256
  n_lstm_layers: 1
  shared_lstm: false
  pi_layers: [128, 128]
  vf_layers: [128, 128]

env:
  size: 20
  difficulty: 1 # Başlangıç zorluğu
  max_energy: 200
  max_episode_steps: 2000
